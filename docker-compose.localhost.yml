services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.localhost
    volumes:
      - ./src:/app/src  # hot reload — reflects local file changes immediately
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:6
    command: --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status().ok } catch(e) { rs.initiate().ok }"]
      interval: 10s
      timeout: 5s
      retries: 5

